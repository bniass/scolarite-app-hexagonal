spring:
  main:
    allow-bean-definition-overriding: true
  application:
      name: inscription-service

  profiles:
    active: mysql,dev

  # WSO2 API Gateway — validation JWT
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8180/realms/scolarite/protocol/openid-connect/certs
          issuer-uri: http://keycloak:8180/realms/scolarite

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:8889/inscription-service
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show_sql: true

kafka-config:
  bootstrap-servers: localhost:19092,localhost:29092,localhost:39092
  schema-registry-url: http://localhost:8081
  schema-registry-url-key: schema.registry.url
  num-of-partitions: 3
  replication-factor: 3

kafka-producer:
  acks: all
  retry-count: 2147483647
  idempotence: true
  compression-type: snappy
  linger-ms: 5
  request-timeout-ms: 60000
  key-serializer-class: org.apache.kafka.common.serialization.StringSerializer
  value-serializer-class: io.confluent.kafka.serializers.KafkaAvroSerializer


kafka-consumer:
  group-id: default-group
  auto-offset-reset: earliest
  auto-commit: false
  concurrency: 3
  key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
  session-timeout-ms: 10000
  batch-listener: false
  concurrency-level: 3
  auto-startup: true
  poll-timeout-ms: 150
  specific-avro-reader: true

kafka-topics:
  anneeacademique-topic-request-name: creer-annee-request
  inscription-creee-topic: inscription-creee
  inscription-annulee-topic: inscription-annulee
  inscription-transfere-topic: inscription-transfere
  paiement-confirme-topic: paiement-confirme

etudiant-service:
  base-url: http://localhost:8092

school-service:
  base-url: http://localhost:8094

inscription:
  transfert:
    delai-max-mois: 3

app:
  kafka:
    format: json   # ou avro
  keycloak:
    # URL publique accessible depuis le navigateur (pas le réseau Docker interne)
    # Override via variable d'env Docker Compose : APP_KEYCLOAK_PUBLIC-URL=http://<host>:8180
    public-url: ${APP_KEYCLOAK_PUBLIC_URL:http://localhost:8180}
    realm: ${APP_KEYCLOAK_REALM:scolarite}

server:
  port: 8091

logging:
  file:
    name: /tmp/inscription-service.log
  level:
    root: INFO
    com.ecole221: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics
  metrics:
    tags:
      application: ${spring.application.name}
